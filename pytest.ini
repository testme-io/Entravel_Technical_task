[pytest]
markers =
    smoke: minimal checks — service is alive and core flow works
    regression: full regression suite
    happy_path: positive scenarios with valid data
    api: API layer tests
    ui: UI layer tests
    positive: positive scenarios
    negative: negative scenarios
    boundary: boundary value tests
    security: security checks
    stress: stress and performance tests
    persistence: data persistence checks


testpaths = tests
addopts = -v --tb=short --timeout=30