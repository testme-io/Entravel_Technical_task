name: Allure Report

on:
  push:
    branches:
      - main

jobs:
  generate-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Browsers
        run: playwright install --with-deps

      - name: Run tests
        run: |
          pytest --alluredir=allure-results
        continue-on-error: true

      - name: Get Allure history
        uses: actions/checkout@v4
        if: always()
        continue-on-error: true
        with:
          ref: gh-pages
          path: allure-history

      - name: Allure Report action
        uses: simple-elf/allure-report-action@master
        if: always()
        with:
          allure_results: allure-results
          allure_history: allure-history
          keep_reports: 20

      - name: Finalize Deployment Directory
        if: always()
        run: |
          mkdir -p deploy/report
          # Копируем твой кастомный дашборд в корень
          cp docs/index.html deploy/index.html
          cp docs/test_cases.js deploy/test_cases.js
          # Берем файлы из последнего созданного отчета (самая большая цифра в папке) и кладем в /report/
          LATEST_DIR=$(ls -d allure-history/*/ | sort -V | tail -n 1)
          cp -r $LATEST_DIR* deploy/report/

      - name: Deploy to Github Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: deploy
          publish_branch: gh-pages
          force_orphan: true